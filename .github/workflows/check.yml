name: Amul Stock Check

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes, 24/7
  workflow_dispatch:         # lets you click "Run workflow" manually in GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run stock checker
        env:
          NTFY_TOPIC:     ${{ secrets.NTFY_TOPIC }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python amul_checker.py

      - name: Save state file back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f amul_stock_state.json
          git diff --staged --quiet || git commit -m "chore: update stock state"
          git push
